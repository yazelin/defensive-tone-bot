name: Deploy Worker

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "migrations/**"
      - "wrangler.toml"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:

concurrency:
  group: deploy-worker
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - name: Apply D1 migrations
        run: npx wrangler d1 migrations apply defensive-tone-bot --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
