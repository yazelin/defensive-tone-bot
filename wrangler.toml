name = "defensive-tone-bot"
main = "src/index.ts"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "defensive-tone-bot"
# 由 `npx wrangler d1 create defensive-tone-bot` 取得後貼入:
database_id = ""

[vars]
LLM_BASE = "https://api.groq.com/openai/v1"
LLM_MODEL = "openai/gpt-oss-120b"

# Secrets(用 `npx wrangler secret put <NAME>`,不放這裡):
#   LINE_CHANNEL_SECRET         LINE Messaging API channel secret
#   LINE_CHANNEL_ACCESS_TOKEN   LINE Messaging API channel access token (long-lived)
#   LLM_API_KEY                 LLM 供應商金鑰(Groq/OpenAI/相容)